<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <h1>Registration Form</h1>

        <label>Name:</label>
        <input type="text" placeholder="Enter Your Name"> <br><br>
        <label>Email:</label>
        <input type="email" placeholder="Enter Your Email" required> <br><br>

        <label>Password:</label>
        <input type="password" placeholder="Enter The Password"> <br> <br>

        <label>Confirm Password:</label>
        <input type="password" placeholder="Enter the same passord used before"> <br> <br>

        <label>Phone Number:</label>
        <input type="number" placeholder="Enter your Phone number"> <br> <br>

        <label>DOB:</label>
        <input type="date"> <br> <br>

        <label>Gender:</label> <br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female  <br><br>

        <label>Courses:</label>
        <select>
            <option>B.Tech</option>
            <option>B.Com</option>
            <option>BSC</option>
            <option>B.Pharma</option>
            <option>BBA</option>
        </select> <br> <br>

        <label>Skills:</label> <br>
        <input type="checkbox">Java Full Stack <br>
         <input type="checkbox">Python Full Stack <br>
          <input type="checkbox">MERN <br>
           <input type="checkbox">AI/ML <br>
            <input type="checkbox">Cyber security <br>
             <input type="checkbox">Software Enginner <br> <br>

        <label>Address:</label><br>
        <textarea rows="4" cols="30"></textarea> <br><br>

        <label for="">Upload Resume:</label>
        <input type="file"> <br> <br>

        <button>Submit</button>


    </form>
</body>
</html>
